<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingenia</title>
    <link rel="stylesheet" href="Css/Main-Menu-Style.css" type="text/css">
</head>
<body>
    <div class="logo">
        <img src="Imágenes/Ingenia_Logo.png" alt="Not found">
    </div>
    <div class="content_window">
        <div class="window">
            <div class="content_window_items">
                <div class="content_text">
                    <p class="title_text">Welcome back</p>
                    <p class="normal_text">Access your account to continue</p>
                </div>
                <div class="content_inputs">
                    <p class="normal_text">Email</p>
                    <input type="email" id="input_email_LogIn" placeholder="tu@correo.com">
                    <p class="normal_text">Password</p>
                    <input type="password" id="input_psw_LogIn" placeholder="* * * * * *">

                    <a href="#" class="forgot_your_password" class="normal_text"></a>

                    <button id="bttn_send_Re"></button>
                </div>
                <div class="content_verification_code_process">
                    <p class="normal_text"></p>
                    <input type="text">
                </div>
                <div class="content_other_signups">
                    <p class="normal_text">or continue with</p>
                    <button id="Microsoft">Iniciar Sesión con Microsoft</button>
                    <button></button>
                </div>
                <div class="content_SignUp">
                    <p class="normal_text">Don't have an account?</p>
                    <a href="#" class="normal_text">Sign Up</a>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
