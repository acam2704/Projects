<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingenia|Tipo de Usuario</title>
    <link rel="stylesheet" href="Css/LogIn-And-SessionLog-Style.css">
</head>
<body>
    <main class="content_window">
        <section class="content_inputs">
            <button class="back_bttn" id="user_backbttn">← Volver</button>
            <p class="text_title" id="main_title"> <img src="Imágenes/Ingenia_Logo.png" alt="" id="logo"> Ingenia</p> <br>
            <article>
                <legend>Seleccione su tipo de perfil</legend>
                <section class="user_bttn_send" id="construction_worker_bttn">
                    <article for="construction_worker" class="option_user">
                        <article>
                            <img src="Imágenes/llave-inglesa.png" alt="" id="option_user_cw_img" class="img_option">
                            <h1 class="bttn_title_text textbttn">Soy Cliente</h1>
                            <h2 class="bttn_subtitle_text textbttn">Busco servicios profesionales</h2>
                            <h3 class="bttn_normal_text textbttn">Necesito resolver problemas de forma confiable y profesional</h3>
                            
                            <a class="bttn_subtitle_text" id="continueText_from_cwOption">Continuar →</a>
                        </article>
                    </article>
                </section>
                <section class="user_bttn_send" id="client_bttn">
                    <article for="client" class="option_user">
                        <article>
                            <img src="Imágenes/casa.png" alt="" id="option_user_c_img" class="img_option">
                            <h1 class="bttn_title_text textbttn">Soy Albañil</h1>
                            <h2 class="bttn_subtitle_text textbttn">Ofrezco mis servicios técnicos</h2>
                            <h3 class="bttn_normal_text textbttn">Experiencia técnica y soluciones especializadas</h3>
                            
                            <a class="bttn_subtitle_text" id="continueText_from_cOption">Continuar →</a>
                        </article>
                    </article>
                </section>
            </article>
        </section>
    </main>

    <aside id="aside_background">
    </aside>

    <footer>

    </footer>
    <script src="Javascript/user_javascript.js"></script>
</body>
</html>
