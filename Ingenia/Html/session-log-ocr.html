<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingenia|Registro de Usuario</title>
    <link rel="stylesheet" href="Css/LogIn-And-SessionLog-Style.css">
</head>
<body>
    <main class="content_window">
        <section class="content_inputs">
            <button class="back_bttn" id="slocr_backbttn">← Volver</button>
            <p class="text_title" id="main_title">Registro</p> <br>
            <article class="signup_section" id="information_dui_container">
                <section>
                    <article class="file_container">
                        <span></span>
                        <input type="file" accept="image/" capture="environment" id="input_frontdui_OCR" class="input hide">
                        <button class="bttn_send dui" id="bttn_frontdui">
                            <p>Cara frontal</p>
                            <img src="Imágenes/camara-de-fotos.png" alt="Imágenes/camara-de-fotos.png" class="dui_img">
                        </button>
                        <img src="Imágenes/front_dui.png" alt="" id="file_frontdui_OCR" width="150px">
                    </article>
                    <article class="file_container">
                        <span></span>
                        <input type="file" accept="image/" capture="environment" id="input_backdui_OCR" class="input hide">
                        <button class="bttn_send dui" id="bttn_backdui">
                            <p>Cara trasera</p>
                            <img src="Imágenes/camara-de-fotos.png" alt="Imágenes/camara-de-fotos.png" class="dui_img">
                        </button>
                        <img src="Imágenes/back_DUI.png" alt="" id="file_backdui_OCR" width="150px">
                    </article> 
                </section>
            </article>
            <p id="main_alert"></p>
        </section>
    </main>
    <aside id="aside_background">
        <section id="overlay_section_shadow"></section>
    </aside>
    <main id="loading_screen">
        
    </main>

    <script src="Javascript/sessionlog_ocr_javascript.js"></script>
</body>
</html>
