<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis proyectos</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  display:flex;
  background:#f4f6f9;
}

.sidebar{
  width:250px;
  background:#0b2c4d;
  color:white;
  height:100vh;
  padding:20px;
  position:fixed;
}

.menu{
  list-style:none;
}

.menu li{
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  cursor:pointer;
}

.menu li:hover{
  background:#1e4f7a;
}

.main{
  margin-left:250px;
  padding:20px;
  width:100%;
}

.projects{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.project{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.project h2{
  margin-bottom:10px;
  color:#0b2c4d;
}

.status{
  margin-top:10px;
  padding:8px;
  background:#f7894a;
  color:white;
  display:inline-block;
  border-radius:8px;
}

@media(max-width:700px){

  .sidebar{
    display:none;
  }

  .main{
    margin-left:0;
  }

  .projects{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Ingenia</h2>

  <ul class="menu">
<ul class="menu">
        <li onclick="window.location.href='inicio mason.html'"> Inicio</li>
        <li> Albañiles</li>
        <li onclick="window.location.href='Mis proyectos mason.html'"> Mis proyectos</li>
        <li onclick="window.location.href='inventario.html'"> Inventario</li>
        <li onclick="window.location.href='ferreterias.html'"> Ferreterías</li>
  
    </ul>


</ul>
</div>

<div class="main">

  <h1>Mis proyectos </h1>

  <div class="projects">

    <div class="project">
      <h2>Remodelación de cocina</h2>
      <p>Inicio: 15 mayo 2026</p>
      <p>Responsable: José Martínez</p>

      <div class="status">
        En progreso
      </div>
    </div>

    <div class="project">
      <h2>Construcción de terraza</h2>
      <p>Inicio: 20 mayo 2026</p>
      <p>Responsable: Mario López</p>

      <div class="status">
        Pendiente
      </div>
    </div>

  </div>

</div>

</body>
</html>
