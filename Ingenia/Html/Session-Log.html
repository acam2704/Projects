<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-signin-client_id" content="359974457768-j5n8e6eh9c2m100uee1nu0ifvr6nv5tf.apps.googleusercontent.com">
    <title>Ingenia</title>
    <link rel="stylesheet" href="Css/LogIn-And-SessionLog-Style.css" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <div class="content_window">
        <div class="content_inputs">
            <button onclick="Go_back()"><</button>
            <p class="text_title">Registro</p> <br>

            <div id="personal_information_conteiner">
                <span id="text_PI1" class="text_alert"></span>
                <input type="text" placeholder="Nombres del usuario" id="input_name_Re">
                <span id="text_PI2" class="text_alert"></span>
                <input type="text" placeholder="Apellidos del usuario" id="input_lastname_Re">
                <span id="text_PI3" class="text_alert"></span>
                <input type="email" placeholder="Correo electrónico" id="input_email_Re">
            </div>

            <div id="verification_code_container">
                <span id="text_VC1" class="text_alert"></span>
                <input type="text" placeholder="Ejemplo -> a4f9c2" id="input_code_Re">
            </div>

            <div id="identity_information_container">
                <p class="text_section_title" id="legal_information_section_text"></p>
                <span id="text_II1" class="text_alert"></span>
                <input type="file" id="input_DUI_Re">
                <span id="text_II2" class="text_alert"></span>
                <input type="number" id="input_phonenumber_Re">

                <label for="departamento">Departamento de </label>
                <span id="text_II3" class="text_alert"></span>
                <select id="select_departament" name="departamento" required>
                    <option value="">Seleccione un departamento</option>
                </select><br>

                <label for="departamento">Municipio de </label>
                <span id="text_II4" class="text_alert"></span>
                <select id="select_municipality" name="municipio" required>
                    <option value="">Seleccione un municipio</option>
                </select><br>

                <label for="departamento">Distrito de </label>
                <span id="text_II5" class="text_alert"></span>
                <select id="select_district" name="distrito" required>
                    <option value="">Seleccione un distrito</option>
                </select>
            </div>

            <div id="security_information_container">
                <span id="text_SI1" class="text_alert"></span>
                <input type="password" placeholder="Constraseña" id="input_1psw_Re">
                <span id="text_SI2" class="text_alert"></span>
                <input type="password" placeholder="Contraseña" id="input_2psw_Re">
            </div>

            <div id="public_profile_information_container">
                <p class="text_section_title">Foto de perfil</p> <br>
                <img src="" alt="" id="img_Re" onclick="choosePicture()"><br><br>
                <input type="file" id="input_file_Re">
                <span></span>
                <input type="file" id="input_degrees_Re">
                <span></span>
                <input type="text">
            </div>

            <div id="g_id_onload"
                data-client_id="359974457768-j5n8e6eh9c2m100uee1nu0ifvr6nv5tf.apps.googleusercontent.com"
                data-callback="handleCredentialResponse">
            </div>

            <div id="content_buttons_Re">
                <p class="text_alert" id="error_text_alert"></p>
                <button class="bttn_send" id="bttn_send">
                    <div id="loader"></div>
                    <p id="bttn_send_txt">Siguiente</p>
                </button>
                <p class="normal_text">
                    ¿Ya tienes una cuenta? 
                    <a href="#" class="normal_text" id="Go_to_LogIn">Iniciar sesión</a>
                </p> <br>
                
                <div id="content_check_buttons_with">
                    <div id="Google" class="google-container">
                        <div class="g_id_signin" 
                            data-type="standard" 
                            data-size="medium" 
                            data-theme="filled_white" 
                            data-shape="pill" 
                            data-logo_alignment="left">
                        </div>
                    </div>
                    
                    <p class="normal_text">or continue with</p>

                    <div class="content_Microsoft">
                        <button id="Microsoft" class="microsoft-btn" onclick="verifyMicrosoftAccount()">
                            <span class="ms-logo">
                                <span></span><span></span><span></span><span></span>
                            </span>
                            <span>Sign in with Microsoft</span>
                        </button>
                    </div>
                    <br>
                </div>
            </div>
            
        </div>
    </div>
    <script src="Javascript/Main-Javascript.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
