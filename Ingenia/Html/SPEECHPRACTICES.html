<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech practices</title>
</head>
<body>
    <input type="text" id="input_1">
    <button onclick="textToSpeech(document.getElementById('input_1').value)"></button>
    <br>
    <br>
    <input type="text" id="input_2">
    <button id="bttn_speech">Hablar</button>
    <canvas id="wave"></canvas>
    <div id="debug"></div>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script>
        navigator.mediaDevices.getUserMedia({ audio: true })
        .then(() => log('Micrófono OK'))
        .catch(err => log(err));
        
        let stream;
        async function getStream(){
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const canvas = document.getElementById('wave');
            const ctx = canvas.getContext('2d');
        }

        canvas.width = 400;
        canvas.height = 100;
        function log(msg){ document.getElementById('debug').innerHTML += msg + '<br>'; }

        async function getKey(){
            const response = await fetch('Php/getEnv.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    env: 'VoiceFeatures_key1'
                })
            });

            return await response.text();
        }
        
        const endpoint = "https://eastus.tts.speech.microsoft.com/cognitiveservices/v1";
        const button = document.getElementById('bttn_speech');

        async function textToSpeech(texto) {
            const key = await getKey();
            if (texto.trim().length !== 0 && texto.trim().length > 10){
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: {
                        "Ocp-Apim-Subscription-Key": key,
                        "Content-Type": "application/ssml+xml",
                        "X-Microsoft-OutputFormat": "audio-16khz-32kbitrate-mono-mp3"
                    },
                    body: `
                        <speak version='1.0' xml:lang='es-ES'>
                            <voice xml:lang='es-ES' name='es-ES-AlvaroNeural'>
                                ${texto}
                            </voice>
                        </speak>`
                    });

                const audioBlob = await response.blob();
                const url = URL.createObjectURL(audioBlob);

                const audio = new Audio(url);
                audio.play();
            } else {
                log('Ingrese algo en el input');
            }
        }

        let recognizer;
        let recording = false;
        async function speechToText() {
            const input_2 = document.getElementById('input_2');
            const token = await fetch("Php/Speech_to_text.php").then(r => r.text());

            log(token.length);
            log(token);

            const speechConfig = SpeechSDK.SpeechConfig.fromAuthorizationToken(token, "eastus");
            speechConfig.speechRecognitionLanguage = "es-ES";

            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();

            recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

            recognizer.recognized = (s, e) => {
                log(JSON.stringify(e.result));
                log("Texto: " + e.result.text);
            };
            recognizer.recognizing = (s, e) => {
                log(JSON.stringify(e.result));
                log("Intermedio:" + e.result.text);
            };

            recognizer = new SpeechSDK.SpeechRecognizer(
                speechConfig,
                audioConfig
            );
 
            recognizer.recognized = (s, e) => { log("Texto: " + e.result.text); };
            recognizer.recognizing = (s, e) => { log("Intermedio: " + e.result.text); };
            recognizer.canceled = (s, e) => { log("CANCELLED"); log(JSON.stringify(e)); };
            recognizer.sessionStarted = () => { log("SESSION STARTED"); };
            recognizer.sessionStopped = () => { log("SESSION STOPPED"); };

            button.onclick = () => {
                if(!recording){
                    recognizer.startContinuousRecognitionAsync();
                    recording = true;
                    log('Grabación iniciada');
                }else{
                    recognizer.stopContinuousRecognitionAsync();
                    recording = false;
                    log('Grabación detenida');
                }
            };
        }

        speechToText().then(() => {
            log('Recognizer listo');
        });

        const audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        source.connect(analyser);
        analyser.fftSize = 256;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function draw(){
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = canvas.width / bufferLength;
            for(let i = 0; i < bufferLength; i++){
                const height = dataArray[i] / 255 * canvas.height;
                ctx.fillRect(
                    i * barWidth,
                    canvas.height - height,
                    barWidth - 1,
                    height
                );
            }
        }

        draw();
    </script>
</body>
</html>
