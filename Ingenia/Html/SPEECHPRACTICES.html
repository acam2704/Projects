<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech practices</title>
</head>
<body>
    <input type="text" id="input_1">
    <button onclick="textToSpeech(document.getElementById('input_1').value)"></button>
    <br>
    <br>
    <input type="text" id="input_2">
    <button id="bttn_speech">Hablar</button>
    <div id="debug"></div>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script>
        function log(msg){
            document.getElementById('debug').innerHTML += msg + '<br>';
        }

        async function getKey(){
            const response = await fetch('Php/getEnv.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    env: 'VoiceFeatures_key1'
                })
            });

            return await response.text();
        }
        
        const endpoint = "https://eastus.tts.speech.microsoft.com/cognitiveservices/v1";
        const button = document.getElementById('bttn_speech');

        async function textToSpeech(texto) {
            const key = await getKey();
            if (texto.trim().length !== 0 && texto.trim().length > 10){
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: {
                        "Ocp-Apim-Subscription-Key": key,
                        "Content-Type": "application/ssml+xml",
                        "X-Microsoft-OutputFormat": "audio-16khz-32kbitrate-mono-mp3"
                    },
                    body: `
                        <speak version='1.0' xml:lang='es-ES'>
                            <voice xml:lang='es-ES' name='es-ES-AlvaroNeural'>
                                ${texto}
                            </voice>
                        </speak>`
                    });

                const audioBlob = await response.blob();
                const url = URL.createObjectURL(audioBlob);

                const audio = new Audio(url);
                audio.play();
            } else {
                log('Ingrese algo en el input');
            }
        }

        let recognizer;
        let recording = false;
        async function speechToText() {
            const input_2 = document.getElementById('input_2');
            const token = await fetch("Php/Speech_to_text.php").then(r => r.text());

            log(token.length);
            log(token);

            const speechConfig = SpeechSDK.SpeechConfig.fromAuthorizationToken(token, "eastus");
            speechConfig.speechRecognitionLanguage = "es-ES";

            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();

            recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

            recognizer.recognized = (s, e) => {
                log("Texto:" + e.result.text);
            };
            recognizer.recognizing = (s, e) => {
                log("Intermedio:" + e.result.text);
            };
            button.onclick = () => {
                if(!recording){
                    navigator.mediaDevices.getUserMedia({
                        audio: true
                    })
                    .then(() => log('Micrófono OK'))
                    .catch(err => log(err));

                    recognizer.startContinuousRecognitionAsync();

                    recording = true;

                    console.log('Grabación iniciada');
                }else{
                    recognizer.stopContinuousRecognitionAsync();

                    recording = false;

                    console.log('Grabación detenida');
                }
            };
        }

        speechToText().then(() => {
            log('Recognizer listo');
        });
    </script>
</body>
</html>
