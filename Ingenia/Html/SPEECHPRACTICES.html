<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech practices</title>
</head>
<body>
    <input type="text" id="input_1">
    <button onclick="textToSpeech(document.getElementById('input_1').value)"></button>
    <br>
    <br>
    <input type="text" id="input_2">
    <button onclick="speechToText()">Hablar</button>
    <script>
        const endpoint = "https://eastus.tts.speech.microsoft.com/cognitiveservices/v1";
        const key = "1YnTlrdYAe9hxElKuQSOw4wKyXwaGSSfT2nMkXaz8T6ntThznofGJQQJ99CEACYeBjFXJ3w3AAAYACOGS6rp";

        async function textToSpeech(texto) {
            if (texto.trim().length !== 0 && texto.trim().length > 10){
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: {
                        "Ocp-Apim-Subscription-Key": key,
                        "Content-Type": "application/ssml+xml",
                        "X-Microsoft-OutputFormat": "audio-16khz-32kbitrate-mono-mp3"
                    },
                    body: `
                    <speak version='1.0' xml:lang='es-ES'>
                        <voice xml:lang='es-ES' name='es-ES-AlvaroNeural'>
                            ${texto}
                        </voice>
                    </speak>`
                });

                const audioBlob = await response.blob();
                const url = URL.createObjectURL(audioBlob);

                const audio = new Audio(url);
                audio.play();
            } else {
                console.log('Ingrese algo en el input');
            }
        }
        async function speechToText() {
            const token = await fetch("/Php/Speech_to_text.php").then(r => r.text());

            const speechConfig = SpeechSDK.SpeechConfig.fromAuthorizationToken(token, "eastus");
            speechConfig.speechRecognitionLanguage = "es-ES";

            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();

            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

            recognizer.recognizeOnceAsync(result => {
                const input_2 = document.getElementById('input_2');
                if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                    input_2.value = 'Resultado: ' + result.text;
                } else {
                    input_2.value = 'Error: ' + result;
                }
            });
        }
    </script>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
</body>
</html>
