<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inicio</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  display:flex;
  background:#f4f6f9;
}

.sidebar{
  width:250px;
  background:#0b2c4d;
  color:white;
  height:100vh;
  padding:20px;
  position:fixed;
}

.menu{
  list-style:none;
}

.menu li{
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  cursor:pointer;
}

.menu li:hover{
  background:#1e4f7a;
}

.main{
  margin-left:250px;
  padding:20px;
  width:100%;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h2{
  color:#0b2c4d;
  margin-bottom:10px;
}

@media(max-width:900px){
  .cards{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:600px){
  .sidebar{
    display:none;
  }

  .main{
    margin-left:0;
  }

  .cards{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Ingenia</h2>

  <ul class="menu">
   <ul class="menu">
        <li onclick="window.location.href='inicio mason.html'"> Inicio</li>
        <li> Albañiles</li>
        <li onclick="window.location.href='Mis proyectos mason.html'"> Mis proyectos</li>
        <li onclick="window.location.href='inventario.html'"> Inventario</li>
        <li onclick="window.location.href='ferreterias.html'"> Ferreterías</li>
        
    </ul>

  </ul>
</div>

<div class="main">

  <h1>Panel principal 👷🏼</h1>

  <div class="cards">

    <div class="card">
      <h2> </h2>
      <p>Proyectos activos</p>
    </div>

    <div class="card">
      <h2> </h2>
      <p>Herramientas registradas</p>
    </div>

   
  </div>

</div>

</body>
</html>
